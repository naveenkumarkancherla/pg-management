name: pg_management
description: PG Management — owner app
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  flutter_secure_storage: ^9.0.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  image_picker: ^1.1.2   # camera capture + gallery upload for tenant photo

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/pg_icon.png"
  adaptive_icon_background: "#232320"
  adaptive_icon_foreground: "assets/icon/pg_fg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  fonts:
    - family: Serif   # Playfair Display — used for the "PG" logo wordmark
      fonts:
        - asset: assets/fonts/Serif.ttf
