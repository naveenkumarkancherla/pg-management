services:
  - type: web
    name: pg-management-api
    runtime: python
    rootDir: backend            # the Django app lives in backend/
    plan: free                  # free spins down when idle (cold starts); bump to starter for always-on
    region: singapore           # pick the region closest to your Supabase project (lower DB latency)
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate && gunicorn config.wsgi --bind 0.0.0.0:$PORT --log-file -"
    healthCheckPath: /api/plans/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: SECRET_KEY
        generateValue: true     # Render generates a strong secret
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL       # Supabase connection string (prefer the pooler, port 6543)
        sync: false
      - key: ALLOWED_HOSTS      # e.g. pg-management-api.onrender.com
        sync: false
      - key: CSRF_TRUSTED_ORIGINS   # e.g. https://pg-management-api.onrender.com
        sync: false
      - key: CORS_ALLOWED_ORIGINS   # web app origin(s), if you serve the Flutter web build
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: MSG91_API_KEY
        sync: false
      - key: GUPSHUP_API_KEY
        sync: false
      - key: GUPSHUP_SOURCE
        sync: false
      - key: GUPSHUP_APP
        sync: false
      - key: SUPABASE_URL          # Supabase → Settings → API → Project URL
        value: "https://ebhfnpcxyhaklnirbjgn.supabase.co"
      - key: SUPABASE_SERVICE_KEY  # service_role secret — set in dashboard, never commit
        sync: false
      - key: SUPABASE_BUCKET
        value: "pg-management-images"
